; Augmente les limites d'upload PHP par défaut (trop petites pour des vidéos).
; Ce fichier est copié automatiquement dans le conteneur Docker (voir Dockerfile),
; donc ça s'applique aussi bien en local (si tu pointes XAMPP dessus) qu'en prod sur Render.

upload_max_filesize = 200M
post_max_size = 210M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
